name: Release Branch Pipeline (Test & UAT)

on:
  push:
    branches:
      - 'release/v*'
  create:

# 🔄 Automatically cancels older, in-progress runs for the same release branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Simulate Deploy to Test & 2) Run E2E Tests
  deploy-test:
    if: ${{ (github.event_name == 'push' || github.event_name == 'create') && startsWith(github.ref, 'refs/heads/release/v') }}
    runs-on: ubuntu-latest
    environment: test
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 1) Simulate Deploy to Test
        run: |
          echo "Connecting to 'test' environment..."
          echo "Deploying branch: ${{ github.ref_name }}..."
          sleep 5 
          echo "Deployment to Test Complete!"

  # 3) Run Playwright tests in testing/e2e
  run-e2e:
    needs: deploy-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci 
        working-directory: testing/e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: testing/e2e

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: testing/e2e

  # 4) Wait for User Approval & Deploy to UAT
  deploy-uat:
    needs: run-e2e
    runs-on: ubuntu-latest
    environment: uat 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 3) Deploying to UAT (Approved)
        run: |
          echo "Approval received! Proceeding with UAT deployment..."
          echo "Deploying branch ${{ github.ref_name }} to UAT..."
          sleep 5 
          echo "Deployment to UAT Complete!"

      - name: 4) Run E2E Tests on UAT Environment
        run: |
          echo "Running E2E tests against UAT URL: https://uat.your-app.com"
          echo "✔ Critical business workflows validated"
          echo "All E2E tests passed on UAT environment!"
